<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--red:#b5282a;--black:#111;--white:#fff;--cream:#f5f0ea;--gray:#888;--border:#ddd}
  html{scroll-behavior:smooth}
  body{font-family:'Cormorant Garamond',Georgia,serif;color:var(--black);background:var(--white);font-size:21px;line-height:1.7}
  nav{position:fixed;top:0;width:100%;background:rgba(255,255,255,0.96);border-bottom:1px solid var(--border);z-index:100;display:flex;justify-content:center;gap:2rem;padding:0.85rem;flex-wrap:wrap}
  nav a{text-decoration:none;color:var(--gray);font-size:13px;letter-spacing:0.2em;text-transform:uppercase;transition:color 0.2s}
  nav a:hover{color:var(--red)}
  section{padding:5rem 1.5rem}
  .container{max-width:680px;margin:0 auto}
  #hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:var(--cream);padding-top:4rem}
  .save-the-date{font-size:1.1rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--red);margin-bottom:1.5rem}
  .tr{display:block;font-size:0.85em;color:#a07070;letter-spacing:0.08em;margin-top:2px}
  h1{font-size:clamp(3rem,10vw,6.5rem);font-weight:500;color:var(--red);letter-spacing:0.04em;line-height:1;margin-bottom:1.2rem}
  .hero-date{font-size:clamp(0.95rem,2.5vw,1.15rem);letter-spacing:0.2em;color:var(--red);margin-bottom:2.5rem}
  .hero-divider{display:flex;align-items:center;gap:1rem;margin:0 auto 2.5rem;width:260px}
  .hero-divider::before,.hero-divider::after{content:'';flex:1;height:1px;background:var(--red);opacity:0.4}
  .hero-divider-diamond{width:6px;height:6px;background:var(--red);transform:rotate(45deg);opacity:0.6;flex-shrink:0}
  .count-num{font-size:2.5rem;font-weight:400;color:var(--red);display:block;line-height:1}
  .count-label{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:#a07070;margin-top:4px;display:block}
  .section-tag{text-align:center;font-size:13px;letter-spacing:0.35em;text-transform:uppercase;color:var(--red);margin-bottom:0.75rem}
  h2{font-size:2rem;font-weight:400;color:var(--black);margin-bottom:0.4rem;text-align:center;letter-spacing:0.03em}
  h2 .tr{font-size:1rem;color:var(--gray)}
  .section-divider{width:40px;height:1px;background:var(--red);margin:1.5rem auto 3rem;opacity:0.5}
  #programme{background:var(--cream)}
  .day-heading{font-size:13px;letter-spacing:0.35em;text-transform:uppercase;color:var(--red);margin:0 0 2rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border)}
  .day-section{margin-bottom:3.5rem}
  .tl-item{display:grid;grid-template-columns:150px 1px 1fr;gap:0 1.75rem;margin-bottom:2.5rem;align-items:start}
  .tl-time{font-size:1rem;letter-spacing:0.1em;color:var(--red);text-align:right;padding-top:3px;font-style:italic}
  .tl-line{background:var(--border);position:relative}
  .tl-line::before{content:'';position:absolute;top:14px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%;background:var(--red);opacity:0.7}
  .tl-content h3{font-size:1.1rem;font-weight:500;color:var(--black);margin-bottom:2px}
  .tl-content h3.muted{font-weight:400;color:var(--gray)}
  .tl-content h3 .tr{font-size:0.9rem;color:var(--gray);font-weight:400}
  .tl-content p{font-size:1rem;color:var(--gray);line-height:1.5;margin-top:4px}
  .tl-content a{color:var(--red);text-decoration:none;border-bottom:1px solid rgba(181,40,42,0.3)}
  .tl-content ul{font-size:1rem;color:var(--gray);line-height:1.8;margin-top:6px;padding-left:1.2rem}
  .tl-content ul ul{list-style-type:'– ';padding-left:1rem;margin-top:4px;line-height:1.7}
  .subsection-label{font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gray);opacity:0.6;margin:2rem 0 1.5rem;padding-top:1.5rem;border-top:1px solid var(--border)}
  .info-list{list-style:none}
  .info-list li{padding:1.25rem 0;border-bottom:1px solid var(--border);display:grid;grid-template-columns:200px 1fr;gap:1.5rem}
  .info-list li:first-child{border-top:1px solid var(--border)}
  @media(max-width:540px){.info-list li{grid-template-columns:1fr;gap:0.25rem}}
  @media(max-width:540px){
    section{padding:3rem 1.2rem}
    nav{gap:1rem;padding:0.65rem 1rem}
    .tl-item{grid-template-columns:100px 1px 1fr;gap:0 1rem}
    .hero-divider{width:200px}
    h2{font-size:1.6rem}
  }

  .info-val{font-size:1rem;color:var(--black);line-height:1.7}
  .info-val a{color:var(--red);text-decoration:none;border-bottom:1px solid rgba(181,40,42,0.3)}
  #contact{background:var(--cream)}
  .contact-person{padding:1.5rem 0;border-bottom:1px solid var(--border)}
  .contact-person:first-of-type{border-top:1px solid var(--border)}
  .contact-name{font-size:1.3rem;font-weight:500;color:var(--black);margin-bottom:0.5rem;letter-spacing:0.05em}
  .contact-row{display:flex;align-items:center;gap:0.6rem;font-size:1rem;margin-bottom:0.3rem}
  .contact-icon{width:14px;height:14px;flex-shrink:0;opacity:0.45}
  .contact-row a{color:var(--red);text-decoration:none;border-bottom:1px solid rgba(181,40,42,0.3)}
  footer{text-align:center;padding:3rem 1.5rem;background:var(--cream);border-top:1px solid var(--border)}
  .footer-names{font-size:1.4rem;color:var(--red);margin-bottom:0.5rem}
  footer p{font-size:12px;letter-spacing:0.2em;color:var(--gray);text-transform:uppercase}

const icon_phone = `<svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>`;

function tlItem(ev) {
  const bullets = ev.bullets ? `<ul>${ev.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>` : '';
  const after = ev.textAfter ? `<p style="margin-top:8px">${ev.textAfter}</p>` : '';
  return `<div class="tl-item">
    <span class="tl-time">${ev.time}</span>
    <div class="tl-line"></div>
    <div class="tl-content">
      <h3${ev.muted?' class="muted"':''}>${ev.title}${ev.title_tr?`<span class="tr">${ev.title_tr}</span>`:''}</h3>
      ${ev.text?`<p>${ev.text}</p>`:''}${bullets}${after}
    </div>
  </div>`;
}

function renderDay(day) {
  const main = day.events.map(tlItem).join('');
  let sub = '';
  if (day.subsection) {
    sub = `<p class="subsection-label">${day.subsection.label}</p>${day.subsection.events.map(tlItem).join('')}`;
  }
  return `<div class="day-section">
    <p class="day-heading">${day.heading}</p>
    ${main}${sub}
  </div>`;
}

document.addEventListener('DOMContentLoaded', () => {

    <div class="section-divider"></div>
    ${C.programme.days.map(renderDay).join('')}`;
